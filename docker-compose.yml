services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: docqa-backend:latest
    environment:
      DOCQA_APP_NAME: DocQA
      DOCQA_DEBUG: "true"
      DOCQA_DATABASE_URL: sqlite+aiosqlite:///./data/docqa.db
      DOCQA_UPLOAD_DIR: ./uploads
      DOCQA_VECTOR_STORE_DIR: ./data/chroma
      DOCQA_MAX_UPLOAD_SIZE_MB: "50"
      DOCQA_HOST: 0.0.0.0
      DOCQA_PORT: "8000"
    volumes:
      - backend_data:/app/backend/data
      - backend_uploads:/app/backend/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: docqa-frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # ── 非兼容接口适配代理（按需启用） ──
  # 把 HuggingFace TGI 等非 OpenAI 兼容 API 翻译成 OpenAI 格式。
  # 1. 复制 adapter-proxy/config.example.yaml → adapter-proxy/config.yaml
  # 2. 取消下面的注释
  # 3. 在 DocQA 设置页添加 openai_compatible provider，base_url 填 http://adapter-proxy:11435
  #
  # adapter-proxy:
  #   build:
  #     context: ./adapter-proxy
  #     dockerfile: Dockerfile
  #   image: docqa-adapter-proxy:latest
  #   volumes:
  #     - ./adapter-proxy/config.yaml:/app/config.yaml:ro
  #   # Linux 上如果代理容器要访问宿主机模型服务，需要取消下面两行注释；
  #   # macOS / Windows 一般可以直接使用 host.docker.internal
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   ports:
  #     - "11435:11435"
  #   healthcheck:
  #     test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11435/health', timeout=5).read()"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 5s
  #   restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
