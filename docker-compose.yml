services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: docqa-backend:latest
    environment:
      APP_NAME: DocQA
      DEBUG: "true"
      DATABASE_URL: sqlite+aiosqlite:///./data/docqa.db
      UPLOAD_DIR: ./uploads
      VECTOR_STORE_DIR: ./data/chroma
      MAX_UPLOAD_SIZE_MB: "50"
      HOST: 0.0.0.0
      PORT: "8000"
    volumes:
      - backend_data:/app/backend/data
      - backend_uploads:/app/backend/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: docqa-frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
