# LLM Adapter Proxy — 配置文件
# 复制为 config.yaml 后按需修改

adapters:
  # ── HuggingFace TGI 示例 ──
  # 先启动 TGI: docker run -p 8082:80 ghcr.io/huggingface/text-generation-inference:latest --model-id Qwen/Qwen2-7B-Instruct
  - model_name: "tgi-qwen"
    type: "huggingface_tgi"
    base_url: "http://host.docker.internal:8082"

  # ── 通用自定义 API 示例 ──
  # 适配任意 REST API，通过 Jinja2 模板配置请求格式
  #
  # 可用模板变量:
  #   {{ prompt }}        — messages 拼成的纯文本
  #   {{ messages }}      — 原始 messages 列表 (Python list)
  #   {{ messages_json }} — messages 的 JSON 字符串
  #   {{ temperature }}   — 温度参数
  #   {{ max_tokens }}    — 最大 token 数
  #   {{ model }}         — 模型名称
  #
  - model_name: "my-custom-model"
    type: "generic"
    base_url: "http://host.docker.internal:9090"
    chat_endpoint: "/generate"
    request_template: |
      {"prompt": {{ prompt | tojson }}, "max_tokens": {{ max_tokens }}, "temperature": {{ temperature }}}
    response_content_path: "result.text"
    stream: false

  # ── 通用流式 API 示例 ──
  # - model_name: "my-streaming-model"
  #   type: "generic"
  #   base_url: "http://host.docker.internal:9091"
  #   chat_endpoint: "/stream"
  #   request_template: |
  #     {"input": {{ prompt | tojson }}, "params": {"max_new_tokens": {{ max_tokens }}}}
  #   stream: true
  #   stream_content_path: "token.text"
  #   stream_done_field: "done"
